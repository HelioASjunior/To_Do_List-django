{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: 16px;">

        <div class="text-center mb-4">
            <i class="bi bi-check2-square fs-1 text-primary"></i>
            <h4 class="fw-bold mt-2 mb-0">Entrar</h4>
        </div>

        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-circle me-1"></i>
                Usuário ou senha inválidos.
            </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-medium">Usuário</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Digite seu usuário" autocomplete="username" autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label fw-medium">Senha</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Digite sua senha" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                Entrar
            </button>
        </form>

        <p class="mt-3 text-center mb-0 small text-muted">
            Não tem conta?
            <a href="{% url 'signup' %}" class="text-decoration-none fw-medium">Cadastrar</a>
        </p>

    </div>
</div>

{% endblock %}

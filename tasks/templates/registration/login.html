{% extends 'base.html' %}

{% block content %}

<div style="max-width:400px; margin:auto;">
    <h2 class="mb-4 text-center">Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100">Entrar</button>
    </form>

    <p class="mt-3 text-center">
        <a href="{% url 'signup' %}">Criar conta</a>
    </p>
</div>

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 16px;">

        <h3 class="text-center mb-4 fw-bold">Login</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Digite seu usuário">
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="Digite sua senha">
            </div>

            <button class="btn btn-primary w-100 py-2 fw-semibold">
                Entrar
            </button>
        </form>

        <p class="mt-3 text-center">
            <a href="{% url 'signup' %}" class="text-decoration-none">
                Criar conta
            </a>
        </p>

    </div>
</div>

{% endblock %}
